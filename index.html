<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Robusr's Utopia">
<title>Terminal</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Fira Code', 'Menlo', 'Consolas', 'SF Mono', 'Monaco', monospace;
}

/* ===== Fullscreen Background ===== */
.bg {
  position: fixed;
  inset: 0;
  background: url('./Street.jpg') center / cover no-repeat;
  z-index: 0;
}

/* ===== Terminal Window ===== */
.terminal {
  position: relative;
  z-index: 1;
  width: min(92vw, 750px);
  max-height: 85vh;
  margin: 5vh auto 0;
  display: flex;
  flex-direction: column;
  background: rgba(30, 30, 40, 0.72);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 10px;
  box-shadow:
    0 25px 70px rgba(0, 0, 0, 0.55),
    0 0 0 0.5px rgba(255, 255, 255, 0.08) inset;
  overflow: hidden;
}

/* ===== Title Bar ===== */
.titlebar {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 12px;
  background: rgba(50, 50, 58, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  user-select: none;
  cursor: default;
  flex-shrink: 0;
}

.traffic-lights {
  display: flex;
  gap: 8px;
  margin-right: 12px;
}

.light {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.light.red    { background: #FF5F57; }
.light.yellow { background: #FFBD2E; }
.light.green  { background: #28CA41; }

.title {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.45);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== Terminal Body ===== */
.body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  cursor: text;
  min-height: 120px;
}

/* Custom scrollbar */
.body::-webkit-scrollbar { width: 5px; }
.body::-webkit-scrollbar-track { background: transparent; }
.body::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.12);
  border-radius: 3px;
}
.body::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.22);
}
.body { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

/* ===== Output Area ===== */
.output {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cmd-line {
  display: flex;
  flex-wrap: wrap;
  line-height: 1.6;
  font-size: 14px;
}

.prompt-arrow { color: #A6E22E; }
.prompt-path  { color: #66D9EF; }
.cmd-text     { color: #F8F8F2; margin-left: 4px; word-break: break-all; }

.response {
  color: #C0C0C8;
  font-size: 13.5px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  padding-bottom: 10px;
}

.response a {
  color: #66D9EF;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.response .highlight { color: #A6E22E; }
.response .dim       { color: #8888A0; }
.response .accent    { color: #66D9EF; }
.response .header    { color: #F8F8F2; font-weight: bold; }
.response .tag        {
  display: inline-block;
  color: #FFBD2E;
  background: rgba(255, 189, 46, 0.12);
  padding: 0 6px;
  border-radius: 3px;
  font-size: 11px;
  margin-left: 6px;
  vertical-align: middle;
}

.welcome {
  color: #8888A0;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ===== Input Line ===== */
.input-line {
  display: flex;
  align-items: center;
  line-height: 1.6;
  font-size: 14px;
  margin-top: 4px;
}

#cmdInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #F8F8F2;
  font-family: inherit;
  font-size: 14px;
  caret-color: #A6E22E;
  margin-left: 4px;
  min-width: 20px;
}

#cmdInput::placeholder { color: rgba(255,255,255,0.2); }

/* ===== Loading Spinner ===== */
@keyframes spin {
  to { transform: rotate(360deg); }
}
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #66D9EF;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

/* ===== Mobile ===== */
@media (max-width: 520px) {
  .terminal {
    width: 96vw;
    max-height: 88vh;
    margin-top: 2vh;
    border-radius: 8px;
  }
  .body { padding: 10px 12px; }
  .cmd-line, .input-line, #cmdInput { font-size: 13px; }
  .response { font-size: 12.5px; }
  .light { width: 10px; height: 10px; }
}
</style>
</head>
<body>

<script>

// ============================================================
//  i18n — English-first; switch with:  lang / zh / en

let locale = 'en';

const t = {

    ].join('\n'),
    projectsLoading: 'Fetching repositories from GitHub…',

    projectsTitle: '🚀  GitHub Repositories',
    projectsEmpty: '  No public repositories found.',
    projectsForkTag: 'fork',
    help: [
      '╔══════════════════════════════════════╗',
      '║     💻  Available Commands            ║',
      '╠══════════════════════════════════════╣',
      '║  help      Show this help             ║',
      '║  about     Display bio                ║',
      '║  skills    List skills                ║',
      '║  contact   Show contact info          ║',
      '║  projects  List GitHub repos          ║',
      '║  lang      Toggle EN / 中文            ║',
      '║  clear     Clear screen               ║',
      '╠══════════════════════════════════════╣',
      '║  💬  Or ask naturally:                ║',
      '║  · Who are you?                       ║',
      '║  · What can you do?                   ║',

      '╚══════════════════════════════════════╝',
    ].join('\n'),
    notFound: 'Sorry, I haven\'t learned how to answer that yet. Try typing help to see what I can do.',
    langSwitch: 'Switched to English.',
    titleBar: 'guest@robu — -zsh — 80×24',
  },
  zh: {
    welcome: (name) => [
      `╭────────────────────────────────────────────╮`,
      `│                                            │`,
      `│       欢迎来到 ${name} 的个人主页             │`,
      `│                                            │`,
      `│  输入 <span class="accent">help</span> 查看可用命令                  │`,
      `│  也可以直接向我提问，例如：                  │`,
      `│    <span class="dim">· 你是谁？</span>                         │`,
      `│    <span class="dim">· 你会什么？</span>                       │`,
      `│    <span class="dim">· 怎么联系你？</span>                     │`,
      `│                                            │`,
      `╰────────────────────────────────────────────╯`,
    ].join('\n'),
    placeholder: '输入命令或问题…',
    about: (name, bio) => `👤  ${name}\n${'─'.repeat(28)}\n${bio}`,
    skills: (skills) => {
      const lines = ['📦  技能清单', '─'.repeat(24)];
      skills.forEach((s, i) => lines.push(`  ${String(i + 1).padStart(2, ' ')}. ${s}`));
      return lines.join('\n');
    },
    contact: (c) => [
      '📬  联系方式',
      '─'.repeat(24),
      `  邮箱:    ${c.email}`,
      `  GitHub:  ${c.github}`,
      `  微信:    ${c.wechat}`,
    ].join('\n'),
    projectsLoading: '正在从 GitHub 获取仓库列表…',
    projectsFailed: '⚠  获取仓库失败。请访问: https://github.com/Robusr',
    projectsTitle: '🚀  GitHub 仓库',
    projectsEmpty: '  暂无公开仓库。',
    projectsForkTag: 'fork',
    help: [
      '╔══════════════════════════════════════╗',
      '║     💻  可用命令                       ║',
      '╠══════════════════════════════════════╣',
      '║  help      显示此帮助                  ║',
      '║  about     个人简介                   ║',
      '║  skills    技能列表                   ║',
      '║  contact   联系方式                   ║',
      '║  projects  查看 GitHub 仓库            ║',
      '║  lang      切换 EN / 中文              ║',
      '║  clear     清屏                       ║',
      '╠══════════════════════════════════════╣',
      '║  💬  也可以直接提问：                   ║',
      '║  · 你是谁？                            ║',
      '║  · 你会什么？                          ║',
      '║  · 怎么联系你？                        ║',
      '║  · 你做过什么项目？                    ║',
      '╚══════════════════════════════════════╝',
    ].join('\n'),
    notFound: '抱歉，我还没学会回答这个问题。试试输入 help 看看我能做什么吧。',
    langSwitch: '已切换为中文。',
    titleBar: 'guest@robu — -zsh — 80×24',
  }
};

function tStr(key, ...args) {
  const fn = t[locale][key];
  return typeof fn === 'function' ? fn(...args) : fn;
}

// ============================================================
//  DOM References
// ============================================================
const terminalBody = document.getElementById('terminalBody');
const output       = document.getElementById('output');
const cmdInput     = document.getElementById('cmdInput');
const titleBar     = document.getElementById('titleBar');

// ============================================================
//  State
// ============================================================
let commandHistory = [];
let historyIndex   = -1;
let isTyping       = false;
let ghReposCache   = null;   // cached GitHub API response

// ============================================================
//  Helpers
// ============================================================
function scrollToBottom() {
  terminalBody.scrollTop = terminalBody.scrollHeight;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/** Append a command-line entry and return a response div for typewriter */
function appendCommandLine(cmd) {
  const line = document.createElement('div');
  line.className = 'cmd-line';
  line.innerHTML =
    `<span class="prompt-arrow">➜</span> <span class="prompt-path">~</span> <span class="cmd-text">${escapeHTML(cmd)}</span>`;
  output.appendChild(line);

  const resp = document.createElement('div');
  resp.className = 'response';
  output.appendChild(resp);
  return resp;
}

/** Append a raw-text response without typewriter effect (for instant messages) */
function appendInstantResponse(text) {
  const resp = document.createElement('div');
  resp.className = 'response';
  resp.textContent = text;
  output.appendChild(resp);
  return resp;
}

// ============================================================
//  Typewriter Effect
// ============================================================
async function typeHTML(element, html, speed = 18) {
  isTyping = true;
  cmdInput.disabled = true;

  // Build up innerHTML character by character, respecting HTML tags
  let result = '';
  let i = 0;
  const tagRegex = /<[^>]*>/g;

  while (i < html.length) {
    // Check for HTML tag at current position
    const remaining = html.slice(i);
    const tagMatch = remaining.match(/^<[^>]*>/);
    if (tagMatch) {
      result += tagMatch[0];
      i += tagMatch[0].length;
      element.innerHTML = result;
      scrollToBottom();
      continue;
    }

    result += html[i];
    element.innerHTML = result;
    scrollToBottom();
    i++;

    const ch = html[i - 1];
    const pause =
      (ch === '.' || ch === '。') ? speed * 5 :
      (ch === ',' || ch === '，') ? speed * 3 :
      speed;
    await delay(pause);
  }

  isTyping = false;
  cmdInput.disabled = false;
  cmdInput.focus();
  scrollToBottom();
}

async function typeText(element, text, speed = 18) {
  // Use the HTML path (escaped) so punctuation pauses work
  await typeHTML(element, escapeHTML(text).replace(/\n/g, '<br>'), speed);
}

// ============================================================
//  GitHub Repo Fetching
// ============================================================
async function fetchGitHubRepos() {
  try {
    const res = await fetch('https://api.github.com/users/Robusr/repos?per_page=50&sort=updated');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // Cache only originals (non-forks) + forks separately
    ghReposCache = {
      originals: data.filter(r => !r.fork),
      forks:     data.filter(r => r.fork),
    };
  } catch {
    ghReposCache = null;
  }
}

function formatProjects() {
  if (!ghReposCache) {
    return `<span class="dim">${escapeHTML(tStr('projectsFailed'))}</span>`;
  }

  const { originals, forks } = ghReposCache;
  const lines = [tStr('projectsTitle'), '═'.repeat(40), ''];

  if (originals.length === 0 && forks.length === 0) {
    lines.push(tStr('projectsEmpty'));
    return lines.join('\n');
  }

  originals.forEach((r, i) => {
    lines.push(`  <span class="highlight">${i + 1}.</span> <span class="header">${escapeHTML(r.name)}</span>`);
    if (r.description) {
      lines.push(`     <span class="dim">${escapeHTML(r.description)}</span>`);
    }
    lines.push(`     <span class="accent">🔗 ${escapeHTML(r.html_url)}</span>`);
    if (r.language) {
      lines.push(`     <span class="dim">📄 ${escapeHTML(r.language)}</span>  ⭐ ${r.stargazers_count}  📅 ${new Date(r.created_at).getFullYear()}`);
    }
    lines.push('');
  });

  if (forks.length > 0) {
    lines.push('<span class="dim">─'.repeat(40) + '</span>');
    lines.push(`<span class="dim">Forked repositories:</span>`);
    lines.push('');
    forks.forEach((r, i) => {
      const desc = r.description ? ` — ${r.description}` : '';
      lines.push(`  <span class="dim">${i + 1}.</span> <span class="dim">${escapeHTML(r.name)}</span> <span class="tag">${tStr('projectsForkTag')}</span><span class="dim">${escapeHTML(desc)}</span>`);
      lines.push(`     <span class="accent">🔗 ${escapeHTML(r.html_url)}</span>`);
      lines.push('');
    });
  }

  return lines.join('\n');
}

// ============================================================
//  Language Switch
// ============================================================
function switchLanguage(lang) {
  if (lang === locale) return;
  locale = lang;
  cmdInput.placeholder = tStr('placeholder');
  titleBar.textContent = tStr('titleBar');
  appendInstantResponse(`✨  ${tStr('langSwitch')}`);
  scrollToBottom();
}

// ============================================================
//  Natural Language Matching
// ============================================================
function matchNaturalLanguage(input) {
  const lower = input.toLowerCase();

  // English patterns
  if (/who are you|your name|what.*name/.test(lower)) return 'about';
  if (/what (can|do) you do|skill|ability|tech/.test(lower)) return 'skills';
  if (/contact|email|reach|find you|github|wechat/.test(lower)) return 'contact';
  if (/project|repo|github|code|work|portfolio/.test(lower)) return 'projects';
  if (/about|bio|intro|tell me about|describe/.test(lower)) return 'about';

  // Chinese patterns
  if (/名字|叫什么|是谁|称呼|姓名|你是谁/.test(lower)) return 'about';
  if (/技能|会什么|能力|技术|擅长|懂什么|你会/.test(lower)) return 'skills';
  if (/联系|邮箱|微信|电话|找到你|联系你|怎么联系/.test(lower)) return 'contact';
  if (/项目|作品|做过|写过|仓库|github/.test(lower)) return 'projects';
  if (/简介|介绍|about|关于|背景/.test(lower)) return 'about';

  return null;
}

// ============================================================
//  Command Execution
// ============================================================
async function executeCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) return;

  // Record history (skip consecutive duplicates)
  if (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== cmd) {
    commandHistory.push(cmd);
  }
  historyIndex = commandHistory.length;

  const respDiv = appendCommandLine(cmd);
  scrollToBottom();

  const lower = cmd.toLowerCase();

  // --- Exact commands ---
  if (lower === 'help' || lower === 'h' || lower === '?') {
    await typeHTML(respDiv, tStr('help'));
  } else if (lower === 'about' || lower === 'whoami') {
    await typeText(respDiv, tStr('about', personalInfo.name, personalInfo.bio));
  } else if (lower === 'skills' || lower === 'skill') {
    await typeText(respDiv, tStr('skills', personalInfo.skills));
  } else if (lower === 'contact') {
    await typeText(respDiv, tStr('contact', personalInfo.contact));
  } else if (lower === 'projects' || lower === 'project' || lower === 'portfolio') {
    if (!ghReposCache) {
      // Still loading — show spinner then wait
      respDiv.innerHTML = `<span class="spinner"></span> ${escapeHTML(tStr('projectsLoading'))}`;
      scrollToBottom();
      // Try fetching now in case pre-fetch failed
      await fetchGitHubRepos();
    }
    const html = formatProjects();
    respDiv.innerHTML = '';
    await typeHTML(respDiv, html, 8); // faster for longer output
  } else if (lower === 'lang' || lower === 'locale' || lower === 'zh' || lower === 'cn') {
    if (lower === 'zh' || lower === 'cn') {
      switchLanguage('zh');
    } else {
      switchLanguage(locale === 'en' ? 'zh' : 'en');
    }
    // Remove the response div (lang switch prints its own message)
    respDiv.remove();
  } else if (lower === 'en') {
    switchLanguage('en');
    respDiv.remove();
  } else if (lower === 'clear' || lower === 'cls') {
    output.innerHTML = '';
    cmdInput.value = '';
    cmdInput.focus();
  } else {
    // --- Natural language fallback ---
    const intent = matchNaturalLanguage(cmd);
    let responseText;
    if (intent === 'about') {
      responseText = tStr('about', personalInfo.name, personalInfo.bio);
    } else if (intent === 'skills') {
      responseText = tStr('skills', personalInfo.skills);
    } else if (intent === 'contact') {
      responseText = tStr('contact', personalInfo.contact);
    } else if (intent === 'projects') {
      if (!ghReposCache) await fetchGitHubRepos();
      respDiv.innerHTML = '';
      await typeHTML(respDiv, formatProjects(), 8);
      return;
    } else {
      responseText = tStr('notFound');
    }
    await typeText(respDiv, responseText);
  }
}

// ============================================================
//  Welcome Message
// ============================================================
function showWelcome() {
  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.innerHTML = tStr('welcome', personalInfo.name);
  output.appendChild(welcome);
  scrollToBottom();
}

// ============================================================
//  Event Listeners
// ============================================================
cmdInput.addEventListener('keydown', (e) => {
  if (isTyping) {
    e.preventDefault();
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = cmdInput.value;
    cmdInput.value = '';
    executeCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      cmdInput.value = commandHistory[historyIndex];
    }
    cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < commandHistory.length - 1) {
      historyIndex++;
      cmdInput.value = commandHistory[historyIndex];
    } else {
      historyIndex = commandHistory.length;
      cmdInput.value = '';
    }
    cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length);
  }
});

// Click anywhere in terminal body → focus input
terminalBody.addEventListener('click', () => {
  if (!isTyping) cmdInput.focus();
});

cmdInput.addEventListener('click', (e) => {
  e.stopPropagation();
});

// ============================================================
//  Init
// ============================================================
cmdInput.placeholder = tStr('placeholder');
titleBar.textContent = tStr('titleBar');
showWelcome();
cmdInput.focus();

// Pre-fetch GitHub repos in background for instant `projects` response
fetchGitHubRepos();
</script>

</body>
</html>
