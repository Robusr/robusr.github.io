<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Robusr's Utopia">
<title>Robusr's Utopia</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Fira Code', 'Menlo', 'Consolas', 'SF Mono', 'Monaco', monospace;
}

/* ===== Fullscreen Background ===== */
.bg {
  position: fixed;
  inset: 0;
  background: url('./Street.jpg') center / cover no-repeat;
  z-index: 0;
}

/* ===== Terminal Window ===== */
.terminal {
  position: relative;
  z-index: 1;
  width: min(92vw, 760px);
  max-height: 85vh;
  margin: 5vh auto 0;
  display: flex;
  flex-direction: column;
  background: rgba(30, 30, 40, 0.72);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 10px;
  box-shadow:
    0 25px 70px rgba(0, 0, 0, 0.55),
    0 0 0 0.5px rgba(255, 255, 255, 0.08) inset;
  overflow: hidden;
}

/* ===== Title Bar ===== */
.titlebar {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 12px;
  background: rgba(50, 50, 58, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  user-select: none;
  cursor: default;
  flex-shrink: 0;
}

.traffic-lights {
  display: flex;
  gap: 8px;
  margin-right: 12px;
}

.light {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.light.red    { background: #FF5F57; }
.light.yellow { background: #FFBD2E; }
.light.green  { background: #28CA41; }

.title {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.45);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== Terminal Body ===== */
.body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  cursor: text;
  min-height: 120px;
}

/* Custom scrollbar */
.body::-webkit-scrollbar { width: 5px; }
.body::-webkit-scrollbar-track { background: transparent; }
.body::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.12);
  border-radius: 3px;
}
.body::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.22);
}
.body { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

/* ===== Output Area ===== */
.output {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cmd-line {
  display: flex;
  flex-wrap: wrap;
  line-height: 1.6;
  font-size: 14px;
}

.prompt-arrow { color: #A6E22E; }
.prompt-path  { color: #66D9EF; }
.cmd-text     { color: #F8F8F2; margin-left: 4px; word-break: break-all; }

.response {
  color: #C0C0C8;
  font-size: 13.5px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  padding-bottom: 10px;
}

.response a        { color: #66D9EF; text-decoration: underline; text-underline-offset: 3px; }
.response .hl      { color: #A6E22E; }                    /* highlight */
.response .dim     { color: #8888A0; }                    /* dimmed / secondary */
.response .accent  { color: #66D9EF; }                    /* accent / links */
.response .header  { color: #F8F8F2; font-weight: bold; } /* section headers */
.response .warn    { color: #FFBD2E; }                    /* warnings */
.response .err     { color: #F92672; }                    /* errors */
.response .tag     {
  display: inline-block;
  color: #FFBD2E;
  background: rgba(255, 189, 46, 0.12);
  padding: 0 6px;
  border-radius: 3px;
  font-size: 11px;
  margin-left: 6px;
  vertical-align: middle;
}

.welcome {
  color: #8888A0;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ===== Input Line ===== */
.input-line {
  display: flex;
  align-items: center;
  line-height: 1.6;
  font-size: 14px;
  margin-top: 4px;
}

#cmdInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #F8F8F2;
  font-family: inherit;
  font-size: 14px;
  caret-color: #A6E22E;
  margin-left: 4px;
  min-width: 20px;
}

#cmdInput::placeholder { color: rgba(255,255,255,0.2); }

/* ===== Spinner ===== */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #66D9EF;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

/* ===== Mobile ===== */
@media (max-width: 520px) {
  .terminal {
    width: 96vw;
    max-height: 88vh;
    margin-top: 2vh;
    border-radius: 8px;
  }
  .body { padding: 10px 12px; }
  .cmd-line, .input-line, #cmdInput { font-size: 13px; }
  .response { font-size: 12.5px; }
  .light { width: 10px; height: 10px; }
}
</style>

// ============================================================
//  GitHub Token (session-scoped, stored in sessionStorage)
// ============================================================
function getToken() {
  return sessionStorage.getItem('gh_token') || '';
}

function setToken(val) {
  if (val) {
    sessionStorage.setItem('gh_token', val);
  } else {
    sessionStorage.removeItem('gh_token');
  }
  // Invalidate caches so next fetch uses new credentials
  ghReposCache = null;
  ghProfileCache = null;
}

function authHeaders() {
  const tok = getToken();
  return tok ? { Authorization: `Bearer ${tok}` } : {};
}

// ============================================================
//  Helpers
// ============================================================
function scrollToBottom() {
  terminalBody.scrollTop = terminalBody.scrollHeight;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function appendCommandLine(cmd) {
  const line = document.createElement('div');
  line.className = 'cmd-line';
  line.innerHTML =
    `<span class="prompt-arrow">➜</span> <span class="prompt-path">~</span> <span class="cmd-text">${escapeHTML(cmd)}</span>`;
  output.appendChild(line);

  const resp = document.createElement('div');
  resp.className = 'response';
  output.appendChild(resp);
  return resp;
}

function appendInstant(text) {
  const resp = document.createElement('div');
  resp.className = 'response';
  resp.textContent = text;
  output.appendChild(resp);
  return resp;
}

// ============================================================
//  Typewriter Effect (with HTML tag awareness)
// ============================================================
async function typeHTML(element, html, speed = 16) {
  isTyping = true;
  cmdInput.disabled = true;

  let out = '';
  let i = 0;

  while (i < html.length) {
    const remaining = html.slice(i);
    const tagMatch = remaining.match(/^<[^>]*>/);
    if (tagMatch) {
      out += tagMatch[0];
      i += tagMatch[0].length;
      element.innerHTML = out;
      scrollToBottom();
      continue;
    }

    out += html[i];
    element.innerHTML = out;
    scrollToBottom();
    i++;

    const ch = html[i - 1];
    const pause =
      (ch === '.' || ch === '。') ? speed * 5 :
      (ch === ',' || ch === '，') ? speed * 3 :
      speed;
    await delay(pause);
  }

  isTyping = false;
  cmdInput.disabled = false;
  cmdInput.focus();
  scrollToBottom();
}

async function typeText(element, text, speed = 16) {
  await typeHTML(element, escapeHTML(text).replace(/\n/g, '<br>'), speed);
}

// ============================================================
//  GitHub API Helpers
// ============================================================
async function ghFetch(path) {
  const res = await fetch(`https://api.github.com${path}`, { headers: authHeaders() });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchGitHubProfile() {
  try {
    ghProfileCache = await ghFetch('/users/Robusr');
  } catch {
    ghProfileCache = null;
  }
}

async function fetchGitHubRepos() {
  try {
    const data = await ghFetch('/users/Robusr/repos?per_page=50&sort=updated');
    ghReposCache = {
      originals: data.filter(r => !r.fork),
      forks:     data.filter(r => r.fork),
    };
  } catch {
    ghReposCache = null;
  }
}

// ============================================================
//  Format:  projects
// ============================================================
function formatProjects() {
  if (!ghReposCache) {
    return `<span class="dim">${escapeHTML(tStr('projectsFailed'))}</span>`;
  }

  const { originals, forks } = ghReposCache;
  const lines = [tStr('projectsTitle'), '═'.repeat(40), ''];

  if (originals.length === 0 && forks.length === 0) {
    lines.push(tStr('projectsEmpty'));
    return lines.join('\n');
  }

  originals.forEach((r, i) => {
    lines.push(`  <span class="hl">${i + 1}.</span> <span class="header">${escapeHTML(r.name)}</span>`);
    if (r.description) {
      lines.push(`     <span class="dim">${escapeHTML(r.description)}</span>`);
    }
    lines.push(`     <span class="accent">🔗 ${escapeHTML(r.html_url)}</span>`);
    const meta = [];
    if (r.language) meta.push(`📄 ${escapeHTML(r.language)}`);
    meta.push(`⭐ ${r.stargazers_count}`);
    meta.push(`🔀 ${r.forks_count}`);
    meta.push(`📅 ${new Date(r.created_at).getFullYear()}`);
    lines.push(`     <span class="dim">${meta.join('  ')}</span>`);
    lines.push('');
  });

  if (forks.length > 0) {
    lines.push('<span class="dim">─'.repeat(40) + '</span>');
    lines.push(`<span class="dim">Forked:</span>`);
    lines.push('');
    forks.forEach((r, i) => {
      const desc = r.description ? ` — ${r.description}` : '';
      lines.push(`  <span class="dim">${i + 1}.</span> <span class="dim">${escapeHTML(r.name)}</span> <span class="tag">${tStr('forkTag')}</span><span class="dim">${escapeHTML(desc)}</span>`);
      lines.push(`     <span class="accent">🔗 ${escapeHTML(r.html_url)}</span>`);
      lines.push('');
    });
  }

  if (!getToken()) {
    lines.push(`<span class="dim">${escapeHTML(tStr('tokenHint'))}</span>`);
  }

  return lines.join('\n');
}

// ============================================================
//  Format:  stats
// ============================================================
function formatStats() {
  if (!ghProfileCache) {
    return `<span class="dim">${escapeHTML(tStr('statsFailed'))}</span>`;
  }

  const p = ghProfileCache;
  const lines = [tStr('statsTitle'), '═'.repeat(36), ''];

  lines.push(`  <span class="header">${escapeHTML(p.login)}</span>`);
  if (p.name) lines.push(`  ${escapeHTML(p.name)}`);
  if (p.bio) lines.push(`  <span class="dim">${escapeHTML(p.bio)}</span>`);
  lines.push('');

  // Stats row
  const stats = [
    `📦  <span class="hl">${p.public_repos}</span> repos`,
    `👥  <span class="hl">${p.followers}</span> followers`,
    `💬  <span class="hl">${p.following}</span> following`,
  ];
  lines.push(`  ${stats.join('    ')}`);
  lines.push('');

  if (p.company)  lines.push(`  🏢  ${escapeHTML(p.company)}`);
  if (p.location) lines.push(`  📍  ${escapeHTML(p.location)}`);
  if (p.blog)     lines.push(`  🌐  <span class="accent">${escapeHTML(p.blog)}</span>`);
  lines.push(`  🔗  <span class="accent">${escapeHTML(p.html_url)}</span>`);
  lines.push(`  📅  Joined ${new Date(p.created_at).toLocaleDateString(locale === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`);

  lines.push('');
  lines.push(`  <span class="dim">Public gists: ${p.public_gists}</span>`);

  return lines.join('\n');
}

// ============================================================
//  Language Switch
// ============================================================
function switchLanguage(lang) {
  if (lang === locale) return;
  locale = lang;
  cmdInput.placeholder = tStr('placeholder');
  titleBar.textContent = tStr('titleBar');
  appendInstant(lang === 'en' ? tStr('langEN') : tStr('langZH'));
  scrollToBottom();
}

// ============================================================
//  Natural Language Matching
// ============================================================
function matchNaturalLanguage(input) {
  const lower = input.toLowerCase();

  // English patterns
  if (/who (are|is) (you|this)|your name|what.*name/.test(lower)) return 'about';
  if (/what (can|do) you do|skill|ability|tech stack/.test(lower)) return 'skills';
  if (/contact|email|reach|find you|github|wechat|how.*(contact|reach)/.test(lower)) return 'contact';
  if (/project|repo|github|code|work|portfolio|show.*(project|repo)/.test(lower)) return 'projects';
  if (/about|bio|intro|tell me about|describe|whoami/.test(lower)) return 'about';
  if (/stat|profile|overview|account/.test(lower)) return 'stats';
  if (/help|command|what.*available/.test(lower)) return 'help';

  // Chinese patterns
  if (/名字|叫什么|是谁|称呼|姓名|你是谁/.test(lower)) return 'about';
  if (/技能|会什么|能力|技术|擅长|懂什么|你会/.test(lower)) return 'skills';
  if (/联系|邮箱|微信|电话|找到你|联系你|怎么联系/.test(lower)) return 'contact';
  if (/项目|作品|做过|写过|仓库|github/.test(lower)) return 'projects';
  if (/简介|介绍|about|关于|背景/.test(lower)) return 'about';
  if (/统计|数据|概览|状态|账号/.test(lower)) return 'stats';

  return null;
}

// ============================================================
//  Command Execution
// ============================================================
async function executeCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) return;

  // History
  if (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== cmd) {
    commandHistory.push(cmd);
  }
  historyIndex = commandHistory.length;

  const respDiv = appendCommandLine(cmd);
  scrollToBottom();

  const lower = cmd.toLowerCase();

  // ---- Help ----
  if (lower === 'help' || lower === 'h' || lower === '?') {
    await typeHTML(respDiv, tStr('help'));
  }

  // ---- About ----
  else if (lower === 'about' || lower === 'whoami') {
    await typeText(respDiv, tStr('about', personalInfo.name, personalInfo.bio));
  }

  // ---- Skills ----
  else if (lower === 'skills' || lower === 'skill') {
    const title = tStr('skillsTitle');
    const list = personalInfo.skills[locale]
      .map((s, i) => `  ${String(i + 1).padStart(2, ' ')}. ${s}`)
      .join('\n');
    await typeText(respDiv, `${title}\n${'─'.repeat(24)}\n${list}`);
  }

  // ---- Contact ----
  else if (lower === 'contact') {
    const lines = [
      tStr('contactTitle'),
      '─'.repeat(24),
      tStr('contact', personalInfo.contact),
    ].join('\n');
    await typeText(respDiv, lines);
  }

  // ---- Projects ----
  else if (lower === 'projects' || lower === 'project' || lower === 'portfolio') {
    if (!ghReposCache) {
      respDiv.innerHTML = `<span class="spinner"></span> ${escapeHTML(tStr('projectsLoading'))}`;
      scrollToBottom();
      await fetchGitHubRepos();
    }
    respDiv.innerHTML = '';
    await typeHTML(respDiv, formatProjects(), 8);
  }

  // ---- Stats ----
  else if (lower === 'stats' || lower === 'status') {
    if (!ghProfileCache) {
      respDiv.innerHTML = `<span class="spinner"></span> ${escapeHTML(tStr('statsLoading'))}`;
      scrollToBottom();
      await fetchGitHubProfile();
    }
    respDiv.innerHTML = '';
    await typeHTML(respDiv, formatStats(), 8);
  }

  // ---- Token ----
  else if (lower.startsWith('token')) {
    const parts = cmd.split(/\s+/);
    if (parts.length === 1) {
      // Show current token status
      const hasTok = !!getToken();
      const msg = hasTok
        ? '🔑  Token is set (session only).'
        : '🔒  No token set. Using unauthenticated access (60 req/hr).';
      await typeText(respDiv, `${msg}\n\n${tStr('tokenHint')}`);
    } else if (parts[1].toLowerCase() === 'clear') {
      setToken('');
      await typeText(respDiv, tStr('tokenCleared'));
    } else {
      // Validate token format (ghp_ or github_pat_ prefixes)
      const tok = parts[1];
      if (/^(ghp_|github_pat_)/.test(tok) && tok.length > 20) {
        setToken(tok);
        await typeText(respDiv, tStr('tokenSet'));
        // Re-fetch with new token in background
        fetchGitHubProfile();
        fetchGitHubRepos();
      } else {
        await typeText(respDiv, tStr('tokenBad'));
      }
    }
  }

  // ---- Language ----
  else if (lower === 'lang' || lower === 'locale') {
    switchLanguage(locale === 'en' ? 'zh' : 'en');
    respDiv.remove();
  } else if (lower === 'zh' || lower === 'cn') {
    switchLanguage('zh');
    respDiv.remove();
  } else if (lower === 'en') {
    switchLanguage('en');
    respDiv.remove();
  }

  // ---- Clear ----
  else if (lower === 'clear' || lower === 'cls') {
    output.innerHTML = '';
    cmdInput.value = '';
    cmdInput.focus();
  }

  // ---- Natural language ----
  else {
    const intent = matchNaturalLanguage(cmd);

    if (intent === 'help') {
      respDiv.innerHTML = '';
      await typeHTML(respDiv, tStr('help'));
    } else if (intent === 'about') {
      respDiv.innerHTML = '';
      await typeText(respDiv, tStr('about', personalInfo.name, personalInfo.bio));
    } else if (intent === 'skills') {
      const title = tStr('skillsTitle');
      const list = personalInfo.skills[locale]
        .map((s, i) => `  ${String(i + 1).padStart(2, ' ')}. ${s}`)
        .join('\n');
      respDiv.innerHTML = '';
      await typeText(respDiv, `${title}\n${'─'.repeat(24)}\n${list}`);
    } else if (intent === 'contact') {
      respDiv.innerHTML = '';
      await typeText(respDiv, [
        tStr('contactTitle'),
        '─'.repeat(24),
        tStr('contact', personalInfo.contact),
      ].join('\n'));
    } else if (intent === 'projects') {
      if (!ghReposCache) {
        respDiv.innerHTML = `<span class="spinner"></span> ${escapeHTML(tStr('projectsLoading'))}`;
        scrollToBottom();
        await fetchGitHubRepos();
      }
      respDiv.innerHTML = '';
      await typeHTML(respDiv, formatProjects(), 8);
    } else if (intent === 'stats') {
      if (!ghProfileCache) {
        respDiv.innerHTML = `<span class="spinner"></span> ${escapeHTML(tStr('statsLoading'))}`;
        scrollToBottom();
        await fetchGitHubProfile();
      }
      respDiv.innerHTML = '';
      await typeHTML(respDiv, formatStats(), 8);
    } else {
      await typeText(respDiv, tStr('notFound'));
    }
  }
}

// ============================================================
//  Welcome
// ============================================================
function showWelcome() {
  const div = document.createElement('div');
  div.className = 'welcome';
  div.innerHTML = tStr('welcome');
  output.appendChild(div);
  scrollToBottom();
}

// ============================================================
//  Event Listeners
// ============================================================
cmdInput.addEventListener('keydown', (e) => {
  if (isTyping) { e.preventDefault(); return; }

  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = cmdInput.value;
    cmdInput.value = '';
    executeCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      cmdInput.value = commandHistory[historyIndex];
    }
    cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < commandHistory.length - 1) {
      historyIndex++;
      cmdInput.value = commandHistory[historyIndex];
    } else {
      historyIndex = commandHistory.length;
      cmdInput.value = '';
    }
    cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length);
  }
});

terminalBody.addEventListener('click', () => {
  if (!isTyping) cmdInput.focus();
});

cmdInput.addEventListener('click', (e) => e.stopPropagation());

// ============================================================
//  Init
// ============================================================
cmdInput.placeholder = tStr('placeholder');
titleBar.textContent = tStr('titleBar');
showWelcome();
cmdInput.focus();

// Pre-fetch GitHub data in background
fetchGitHubProfile();
fetchGitHubRepos();
</script>
